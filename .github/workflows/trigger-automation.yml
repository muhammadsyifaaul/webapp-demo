name: Trigger Automation Tests

on:
  push:
    branches:
      - main
      - master

jobs:
  trigger-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Selenium Automation Repository
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/muhammadsyifaaul/selenium-automation-demo/dispatches \
            -d '{"event_type":"webapp_updated","client_payload":{"branch": "${{ github.ref_name }}", "commit_sha": "${{ github.sha }}"}}'
